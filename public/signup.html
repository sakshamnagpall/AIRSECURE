<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airsecure Sign Up</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="panel auth-panel">
      <h1>Join Airsecure</h1>
      <p class="tagline">Register to manage attendance or access student insights.</p>

      <form id="signupForm" class="card form-card">
        <label for="name">Full Name</label>
        <input id="name" name="name" type="text" placeholder="Your full name" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Create a strong password" required />

        <label for="role">Role</label>
        <select id="role" name="role" required>
          <option value="teacher">Teacher</option>
          <option value="student">Student</option>
        </select>

        <label for="subject">Primary Subject</label>
        <input id="subject" name="subject" type="text" placeholder="Mathematics, Science, etc." />

        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <p class="small-text">Already registered? <a href="index.html">Login here</a></p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
